<!DOCTYPE html>
<html>
<head>
    <title>Magic Card 💖</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
        }

        .page1 {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: pink;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.1);
        }

        img {
            width: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .page2 {
            display: none;
            height: 100vh;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: white;
            padding-top: 100px;
        }
    </style>
</head>

<body>

<div class="page1" id="page1">
<div class="card" onclick="openCard()">
        <h2>✨ Click Me ✨</h2>
        <p>Something special is waiting 💌</p>
    </div>
</div>

<div class="page2" id="page2">
 <h1>💖 Happy Special Day 💖</h1>
    <p>You are very special to me ✨
    You are my second mother </p>
        <p>💫you don't show your love but share it .<p/>
    <p>
    Always keep smiling my dear brother 🥰 ❤️💕
        may all your dreams comes true ❤️
        💕Wish you many more happy return of the day
    </p>
  
    
</div>

<script>
function openCard() {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
}
</script>

</body>
</html>
